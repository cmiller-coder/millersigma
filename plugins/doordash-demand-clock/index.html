<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Order Demand Clock — DoorDash Sigma Plugin</title>
<script src="https://unpkg.com/@sigmacomputing/plugin"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,Inter,Segoe UI,Roboto,Arial,sans-serif;background:transparent;color:#191919;overflow:hidden}
  #wrap{height:100%;width:100%;display:flex;flex-direction:column;padding:12px 14px 8px;gap:6px}
  #top{display:flex;justify-content:space-between;align-items:baseline;flex:0 0 auto}
  #ttl{font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#EB1700}
  #meta{font-size:11px;color:#8a8f94}
  #meta b{color:#191919}
  #stage{flex:1;position:relative;overflow:hidden}
  svg{width:100%;height:100%;display:block}
  .wedge{transition:opacity .12s}
  .hr{font-size:10px;font-weight:700;fill:#6b7077}
  .cval{font-size:30px;font-weight:800;fill:#191919}
  .clab{font-size:10px;font-weight:700;fill:#8a8f94;letter-spacing:.08em}
  #legend{flex:0 0 auto;display:flex;flex-wrap:wrap;gap:4px 14px;font-size:10px;color:#4a5560;align-items:center;justify-content:center}
  #legend .li{display:flex;align-items:center;gap:5px}
  .dot{width:9px;height:9px;border-radius:2px;flex:0 0 9px}
  #tip{position:fixed;pointer-events:none;background:#191919;border-radius:8px;padding:8px 10px;font-size:11px;color:#fff;opacity:0;transition:opacity .1s;z-index:20;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.35)}
  #tip b{color:#FF6A4D}
</style>
</head>
<body>
<div id="wrap">
  <div id="top"><div id="ttl">Order demand by hour</div><div id="meta"><b id="tot">—</b> orders/day · peak <b id="peak">—</b></div></div>
  <div id="stage"><svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg></div>
  <div id="legend"></div>
</div>
<div id="tip"></div>
<script>
(function(){
  var client=(window.sigmaComputing&&window.sigmaComputing.plugin&&window.sigmaComputing.plugin.client)||null;
  var NS='http://www.w3.org/2000/svg', TAU=Math.PI*2, tip=document.getElementById('tip');
  // daypart bands + colors (DoorDash warm palette)
  var BANDS=[
    {name:'Late night',hrs:[0,1,2,3,4],c:'#5B2340'},
    {name:'Breakfast',hrs:[5,6,7,8,9,10],c:'#F0872E'},
    {name:'Lunch',hrs:[11,12,13,14],c:'#EB1700'},
    {name:'Afternoon',hrs:[15,16,17],c:'#C0453A'},
    {name:'Dinner',hrs:[18,19,20,21,22],c:'#B3122E'},
    {name:'Late',hrs:[23],c:'#5B2340'}
  ];
  var HC={}; BANDS.forEach(function(b){b.hrs.forEach(function(h){HC[h]=b;});});
  var defs=[
    {name:'source',type:'element'},
    {name:'hour',type:'column',source:'source',allowedTypes:['number','integer'],label:'Hour of day (0-23)'},
    {name:'value',type:'column',source:'source',allowedTypes:['number','integer'],label:'Orders'}
  ];
  if(client) client.config.configureEditorPanel(defs);
  function fmt(n){ if(n>=1e9)return (n/1e9).toFixed(1)+'B'; if(n>=1e6)return (n/1e6).toFixed(1)+'M'; if(n>=1e3)return (n/1e3).toFixed(0)+'K'; return ''+Math.round(n); }
  function hlbl(h){ var ap=h<12?'a':'p'; var hh=h%12; if(hh===0)hh=12; return hh+ap; }
  function P(cx,cy,r,th){ return [cx+r*Math.sin(th), cy-r*Math.cos(th)]; }
  function el(t,a){ var e=document.createElementNS(NS,t); for(var k in a)e.setAttribute(k,a[k]); return e; }
  function draw(byHour){
    var svg=document.getElementById('svg'); while(svg.firstChild)svg.removeChild(svg.firstChild);
    var st=document.getElementById('stage'), W=st.clientWidth||600, H=st.clientHeight||360;
    var cx=W/2, cy=H/2, ro=Math.min(W,H)/2-30, ri=ro*0.32;
    var max=0,tot=0,peak=0,peakv=-1;
    for(var h=0;h<24;h++){ var v=byHour[h]||0; if(v>max)max=v; tot+=v; if(v>peakv){peakv=v;peak=h;} }
    if(max<=0){ return; }
    var g=el('g',{}); svg.appendChild(g);
    // faint radial gridlines
    [0.25,0.5,0.75,1].forEach(function(f){ g.appendChild(el('circle',{cx:cx,cy:cy,r:ri+(ro-ri)*f,fill:'none',stroke:'#E7E9EC','stroke-width':1})); });
    var step=TAU/24, gap=step*0.16;
    for(h=0;h<24;h++){
      var v=byHour[h]||0, band=HC[h]||{c:'#EB1700',name:''};
      var th=h*step, a0=th-step/2+gap/2, a1=th+step/2-gap/2;
      var r1=ri+(ro-ri)*(v/max);
      var p0i=P(cx,cy,ri,a0),p0o=P(cx,cy,r1,a0),p1o=P(cx,cy,r1,a1),p1i=P(cx,cy,ri,a1);
      var d='M'+p0i[0]+','+p0i[1]+' L'+p0o[0]+','+p0o[1]+' A'+r1+','+r1+' 0 0 1 '+p1o[0]+','+p1o[1]+' L'+p1i[0]+','+p1i[1]+' A'+ri+','+ri+' 0 0 0 '+p0i[0]+','+p0i[1]+' Z';
      var w=el('path',{d:d,fill:band.c,'fill-opacity':h===peak?1:0.82}); w.classList.add('wedge');
      (function(hh,vv,bn){ w.addEventListener('mousemove',function(e){ tip.style.opacity=1; tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY+14)+'px';
        tip.innerHTML='<b>'+hlbl(hh)+'–'+hlbl((hh+1)%24)+'</b><br>'+bn+'<br>'+fmt(vv)+' orders · '+(vv/tot*100).toFixed(1)+'%'; });
        w.addEventListener('mouseleave',function(){ tip.style.opacity=0; }); })(h,v,band.name);
      g.appendChild(w);
      if(h%3===0){ var lp=P(cx,cy,ro+14,th); var t=el('text',{x:lp[0],y:lp[1]+3,'text-anchor':'middle'}); t.setAttribute('class','hr'); t.textContent=hlbl(h); g.appendChild(t); }
    }
    var cv=el('text',{x:cx,y:cy-2,'text-anchor':'middle'}); cv.setAttribute('class','cval'); cv.textContent=fmt(tot); g.appendChild(cv);
    var cl=el('text',{x:cx,y:cy+16,'text-anchor':'middle'}); cl.setAttribute('class','clab'); cl.textContent='ORDERS / DAY'; g.appendChild(cl);
    document.getElementById('tot').textContent=fmt(tot);
    document.getElementById('peak').textContent=hlbl(peak)+'–'+hlbl((peak+1)%24);
    var lg=document.getElementById('legend'); lg.innerHTML='';
    BANDS.filter(function(b){return b.name!=='Late';}).forEach(function(b){ var li=document.createElement('div'); li.className='li'; li.innerHTML='<span class="dot" style="background:'+b.c+'"></span>'+b.name; lg.appendChild(li); });
  }
  function synth(){
    // realistic order-by-hour profile: lunch + dinner double peak
    var base=[3,2,1,1,1,2,5,9,11,9,10,22,26,18,11,10,13,20,30,33,27,17,9,5];
    var o={}; for(var h=0;h<24;h++) o[h]=Math.round(base[h]*1000*(1+0.02*h)); return o;
  }
  var stt={cfg:{},data:null,unsub:null};
  function recompute(){ var c=stt.cfg||{};
    if(stt.data&&c.hour&&c.value&&stt.data[c.hour]){
      var hs=stt.data[c.hour]||[], vs=stt.data[c.value]||[], o={};
      for(var i=0;i<hs.length;i++){ var h=Math.round(Number(hs[i])); if(h>=0&&h<24) o[h]=(o[h]||0)+(Number(vs[i])||0); }
      if(Object.keys(o).length){ draw(o); return; }
    }
    draw(synth());
  }
  if(client){ client.config.subscribe(function(cfg){ stt.cfg=cfg||{};
    if(stt.unsub){stt.unsub();stt.unsub=null;}
    if(cfg&&cfg.source){ stt.unsub=client.elements.subscribeToElementData(cfg.source,function(d){ stt.data=d; recompute(); }); }
    recompute(); });
  } else { recompute(); }
  window.addEventListener('resize',function(){ recompute(); });
})();
</script>
</body>
</html>
