<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Capital Flow Chord — JPMorganChase Sigma Plugin</title>
<script src="https://unpkg.com/@sigmacomputing/plugin"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,Inter,Segoe UI,Roboto,Arial,sans-serif;background:transparent;color:#0B1F3A;overflow:hidden}
  #wrap{height:100%;width:100%;display:flex;flex-direction:column;padding:12px 14px 8px;gap:6px}
  #top{display:flex;justify-content:space-between;align-items:baseline;flex:0 0 auto}
  #ttl{font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#117ACA}
  #meta{font-size:11px;color:#7c8792}
  #meta b{color:#0B1F3A}
  #stage{flex:1;position:relative;overflow:hidden}
  svg{width:100%;height:100%;display:block}
  .arc{cursor:default;transition:opacity .12s}
  .ribbon{transition:opacity .12s,fill-opacity .12s}
  .glab{font-size:10.5px;font-weight:700;fill:#0B1F3A;pointer-events:none}
  .gsub{font-size:9px;font-weight:600;fill:#7c8792;pointer-events:none}
  .dim{opacity:.08}
  #tip{position:fixed;pointer-events:none;background:#0B1F3A;border-radius:8px;padding:8px 10px;font-size:11px;color:#fff;opacity:0;transition:opacity .1s;z-index:20;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.35)}
  #tip b{color:#7FC0F2}
</style>
</head>
<body>
<div id="wrap">
  <div id="top"><div id="ttl">Capital &amp; funding flows</div><div id="meta"><b id="tot">—</b> gross flows · <b id="ng">0</b> lines of business</div></div>
  <div id="stage"><svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg></div>
</div>
<div id="tip"></div>
<script>
(function(){
  var client=(window.sigmaComputing&&window.sigmaComputing.plugin&&window.sigmaComputing.plugin.client)||null;
  var PALETTE=['#0B2E5E','#117ACA','#2E6FB0','#1E9AD6','#5B4B8A','#B99A5B','#0E7C7B','#C77D2E'];
  var NS='http://www.w3.org/2000/svg', PAD=0.055, TWO=Math.PI*2, tip=document.getElementById('tip');
  var defs=[
    {name:'source',type:'element'},
    {name:'from',type:'column',source:'source',label:'From (line of business)'},
    {name:'to',type:'column',source:'source',label:'To (line of business)'},
    {name:'value',type:'column',source:'source',allowedTypes:['number','integer'],label:'Flow amount'}
  ];
  if(client) client.config.configureEditorPanel(defs);
  function fmt$(n){ if(n>=1e12)return '$'+(n/1e12).toFixed(2)+'T'; if(n>=1e9)return '$'+(n/1e9).toFixed(0)+'B'; if(n>=1e6)return '$'+(n/1e6).toFixed(0)+'M'; if(n>=1e3)return '$'+(n/1e3).toFixed(0)+'K'; return '$'+Math.round(n); }
  function esc(s){ return String(s).replace(/[&<>]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m];}); }
  function P(cx,cy,r,a){ return [cx+r*Math.sin(a), cy-r*Math.cos(a)]; }
  function el(tag,attrs){ var e=document.createElementNS(NS,tag); for(var k in attrs) e.setAttribute(k,attrs[k]); return e; }
  function draw(names,M){
    var svg=document.getElementById('svg'); while(svg.firstChild) svg.removeChild(svg.firstChild);
    var n=names.length; if(!n) return;
    var st=document.getElementById('stage'), W=st.clientWidth||700, H=st.clientHeight||360;
    var cx=W/2, cy=H/2, base=Math.min(W,H)/2-52, ringR=base, ribR=base-9;
    // symmetric relationship matrix
    var R=[]; for(var i=0;i<n;i++){ R[i]=[]; for(var j=0;j<n;j++) R[i][j]=0; }
    var grand=0;
    for(i=0;i<n;i++) for(j=0;j<n;j++){ var v=(M[i][j]||0)+(M[j][i]||0); R[i][j]=v; if(i!==j) grand+=v; }
    if(grand<=0) return;
    var rowSum=R.map(function(r,ix){ var s=0; for(var j2=0;j2<n;j2++) if(j2!==ix) s+=r[j2]; return s; });
    var tot=rowSum.reduce(function(a,b){return a+b;},0);
    var k=(TWO - n*PAD)/tot;
    var ang=0, sub=[], garc=[];
    for(i=0;i<n;i++){ var gs=ang; sub[i]=[]; for(j=0;j<n;j++){ var s=ang; if(j!==i) ang+=R[i][j]*k; sub[i][j]={s:s,e:ang}; } garc[i]={s:gs,e:ang,mid:(gs+ang)/2}; ang+=PAD; }
    // ribbons (undirected, i<j)
    var rib=el('g',{}); svg.appendChild(rib);
    function ribPath(a0,a1){
      var p0s=P(cx,cy,ribR,a0.s), p0e=P(cx,cy,ribR,a0.e), p1s=P(cx,cy,ribR,a1.s), p1e=P(cx,cy,ribR,a1.e);
      var la0=(a0.e-a0.s>Math.PI)?1:0, la1=(a1.e-a1.s>Math.PI)?1:0;
      return 'M'+p0s[0]+','+p0s[1]+' A'+ribR+','+ribR+' 0 '+la0+' 1 '+p0e[0]+','+p0e[1]+
             ' Q'+cx+','+cy+' '+p1s[0]+','+p1s[1]+' A'+ribR+','+ribR+' 0 '+la1+' 1 '+p1e[0]+','+p1e[1]+
             ' Q'+cx+','+cy+' '+p0s[0]+','+p0s[1]+' Z';
    }
    var ribbons=[];
    for(i=0;i<n;i++) for(j=i+1;j<n;j++){ if(R[i][j]<=0) continue;
      var pth=el('path',{d:ribPath(sub[i][j],sub[j][i]),fill:PALETTE[i%PALETTE.length],'fill-opacity':0.52,stroke:'#fff','stroke-width':0.5});
      pth.dataset.i=i; pth.dataset.j=j; pth.classList.add('ribbon');
      (function(ii,jj,val){
        pth.addEventListener('mousemove',function(e){ tip.style.opacity=1; tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY+14)+'px';
          tip.innerHTML='<b>'+esc(names[ii])+'  ⇄  '+esc(names[jj])+'</b><br>'+fmt$(val)+' · '+(val/grand*100).toFixed(1)+'% of gross'; });
        pth.addEventListener('mouseleave',function(){ tip.style.opacity=0; });
      })(i,j,R[i][j]);
      rib.appendChild(pth); ribbons.push(pth);
    }
    // arcs + labels
    var ag=el('g',{}); svg.appendChild(ag);
    for(i=0;i<n;i++){ var a=garc[i], col=PALETTE[i%PALETTE.length];
      var ps=P(cx,cy,ringR,a.s), pe=P(cx,cy,ringR,a.e), la=(a.e-a.s>Math.PI)?1:0;
      var arc=el('path',{d:'M'+ps[0]+','+ps[1]+' A'+ringR+','+ringR+' 0 '+la+' 1 '+pe[0]+','+pe[1],fill:'none',stroke:col,'stroke-width':11,'stroke-linecap':'butt'});
      arc.classList.add('arc'); arc.dataset.i=i;
      (function(ii){
        arc.addEventListener('mouseenter',function(){ ribbons.forEach(function(rb){ var on=(+rb.dataset.i===ii||+rb.dataset.j===ii); rb.classList.toggle('dim',!on); }); });
        arc.addEventListener('mouseleave',function(){ ribbons.forEach(function(rb){ rb.classList.remove('dim'); }); });
        arc.addEventListener('mousemove',function(e){ tip.style.opacity=1; tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY+14)+'px';
          tip.innerHTML='<b>'+esc(names[ii])+'</b><br>'+fmt$(rowSum[ii])+' total involvement'; });
      })(i);
      ag.appendChild(arc);
      var lp=P(cx,cy,ringR+16,a.mid), anchor=(Math.sin(a.mid)<-0.02)?'end':(Math.sin(a.mid)>0.02?'start':'middle');
      var words=String(names[i]).split(' '), line1=words.slice(0,2).join(' '), line2=words.slice(2).join(' ');
      var t=el('text',{x:lp[0],y:lp[1],'text-anchor':anchor}); t.classList.add('glab');
      var ts1=el('tspan',{x:lp[0],dy:'0'}); ts1.textContent=line1; t.appendChild(ts1);
      if(line2){ var ts2=el('tspan',{x:lp[0],dy:'11'}); ts2.textContent=line2; t.appendChild(ts2); }
      var tv=el('text',{x:lp[0],y:lp[1]+(line2?24:13),'text-anchor':anchor}); tv.classList.add('gsub'); tv.textContent=fmt$(rowSum[i]); t.appendChild(tv);
      ag.appendChild(t); ag.appendChild(tv);
    }
    document.getElementById('tot').textContent=fmt$(grand);
    document.getElementById('ng').textContent=n;
  }
  function synth(){
    var names=['Consumer & Community','Card & Auto','Home Lending','Asset & Wealth','Commercial Banking','Markets & Securities'];
    var flows=[[0,4,180],[0,5,150],[0,2,120],[0,1,90],[0,3,70],[4,5,140],[4,3,80],[4,2,50],[3,5,110],[3,2,40],[1,5,70],[2,5,60]];
    var n=names.length, M=[]; for(var i=0;i<n;i++){M[i]=[];for(var j=0;j<n;j++)M[i][j]=0;}
    flows.forEach(function(f){ M[f[0]][f[1]]+=f[2]*1e9; });
    return {names:names,M:M};
  }
  function build(fromArr,toArr,valArr){
    var idx={}, names=[];
    function gi(x){ var s=(x==null?'—':String(x)); if(idx[s]==null){ idx[s]=names.length; names.push(s); } return idx[s]; }
    var pairs=[];
    for(var r=0;r<fromArr.length;r++){ var v=Number(valArr[r])||0; if(v<=0) continue; pairs.push([gi(fromArr[r]),gi(toArr[r]),v]); }
    var n=names.length, M=[]; for(var i=0;i<n;i++){M[i]=[];for(var j=0;j<n;j++)M[i][j]=0;}
    pairs.forEach(function(p){ M[p[0]][p[1]]+=p[2]; });
    return {names:names,M:M};
  }
  var stt={cfg:{},data:null,unsub:null};
  function recompute(){ var c=stt.cfg||{};
    if(stt.data&&c.from&&c.to&&c.value&&stt.data[c.from]){
      var g=build(stt.data[c.from]||[], stt.data[c.to]||[], stt.data[c.value]||[]);
      if(g.names.length>1){ draw(g.names,g.M); return; }
    }
    var s=synth(); draw(s.names,s.M);
  }
  if(client){ client.config.subscribe(function(cfg){ stt.cfg=cfg||{};
    if(stt.unsub){stt.unsub();stt.unsub=null;}
    if(cfg&&cfg.source){ stt.unsub=client.elements.subscribeToElementData(cfg.source,function(d){ stt.data=d; recompute(); }); }
    recompute(); });
  } else { recompute(); }
  window.addEventListener('resize',function(){ recompute(); });
})();
</script>
</body>
</html>
